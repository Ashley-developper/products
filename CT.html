<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp AI Model Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --wa-bg-deep: #0c1317;
            --wa-panel-bg: #111b21;
            --wa-sidebar-bg: #202c33;
            --wa-chat-bg: #0b141a;
            --wa-header-bg: #202c33;
            --wa-input-bg: #2a3942;
            --wa-bubble-self: #005c4b;
            --wa-bubble-other: #202c33;
            --wa-text-primary: #e9edef;
            --wa-text-secondary: #8696a0;
            --wa-accent: #00a884;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--wa-bg-deep);
            color: var(--wa-text-primary);
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* 极简 WhatsApp 壁纸 */
        .chat-wallpaper {
            background-color: var(--wa-chat-bg);
            background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
            background-repeat: repeat;
            background-size: 440px;
            opacity: 0.06;
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* 气泡尖角 */
        .bubble-left::before {
            content: ""; position: absolute; top: 0; left: -8px;
            width: 8px; height: 13px; background: var(--wa-bubble-other);
            clip-path: polygon(100% 0, 0 0, 100% 100%);
        }
        .bubble-right::after {
            content: ""; position: absolute; top: 0; right: -8px;
            width: 8px; height: 13px; background: var(--wa-bubble-self);
            clip-path: polygon(0 0, 100% 0, 0 100%);
        }

        /* 伸缩条 */
        #resizer {
            width: 4px; cursor: col-resize; background: transparent;
            transition: background 0.3s; z-index: 50;
        }
        #resizer:hover { background: var(--wa-accent); }

        .active-nav-item { color: #00a884 !important; background: #374248; }
        .active-chat { background-color: #2a3942 !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
        
        .typing-dot {
            width: 4px; height: 4px; background: var(--wa-accent);
            border-radius: 50%; animation: typing 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        .modal-enter { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex">

    <!-- 1. 侧边导航窄栏 (固定) -->
    <nav class="w-[64px] bg-[#202c33] flex flex-col items-center py-4 space-y-4 shrink-0 border-r border-white/5 z-50">
        <div onclick="switchView('chats')" id="nav-chats" class="active-nav-item p-3 text-[#aebac1] hover:bg-[#374248] rounded-xl cursor-pointer transition-all relative">
            <i data-lucide="message-square" class="w-6 h-6"></i>
            <span class="absolute top-2 right-2 w-2 h-2 bg-emerald-500 rounded-full"></span>
        </div>
        <div onclick="switchView('status')" id="nav-status" class="p-3 text-[#aebac1] hover:bg-[#374248] rounded-xl cursor-pointer transition-all">
            <i data-lucide="circle-dashed" class="w-6 h-6"></i>
        </div>
        <div onclick="switchView('communities')" id="nav-communities" class="p-3 text-[#aebac1] hover:bg-[#374248] rounded-xl cursor-pointer transition-all">
            <i data-lucide="users" class="w-6 h-6"></i>
        </div>
        <div onclick="switchView('calls')" id="nav-calls" class="p-3 text-[#aebac1] hover:bg-[#374248] rounded-xl cursor-pointer transition-all">
            <i data-lucide="phone" class="w-6 h-6"></i>
        </div>
        <div class="flex-1"></div>
        <div id="settings-trigger" class="p-3 text-[#aebac1] hover:bg-[#374248] rounded-xl cursor-pointer transition-all">
            <i data-lucide="settings" class="w-6 h-6"></i>
        </div>
        <div class="w-9 h-9 bg-emerald-600 rounded-full border border-white/10 flex items-center justify-center font-bold text-xs">AI</div>
    </nav>

    <!-- 2. 二级侧边栏 (可伸缩) -->
    <aside id="sidebar" class="w-[350px] min-w-[280px] max-w-[550px] flex flex-col shrink-0 bg-[#111b21] border-r border-white/10 relative overflow-hidden">
        
        <!-- 对话列表视图 -->
        <div id="view-chats" class="flex flex-col h-full">
            <header class="p-4 space-y-4">
                <div class="flex justify-between items-center">
                    <h1 class="text-xl font-bold text-white">对话 (Models)</h1>
                    <i data-lucide="square-pen" class="w-5 h-5 text-[#aebac1] cursor-pointer"></i>
                </div>
                <div class="bg-[#202c33] h-9 rounded-lg flex items-center px-3 group focus-within:bg-[#2a3942] transition-all">
                    <i data-lucide="search" class="w-4 h-4 text-[#8696a0] mr-4 group-focus-within:text-emerald-500"></i>
                    <input type="text" placeholder="搜索模型或消息" class="bg-transparent text-[14px] w-full outline-none text-white placeholder-[#8696a0]">
                </div>
            </header>
            <div id="contact-list" class="flex-1 overflow-y-auto divide-y divide-white/5">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 动态视图 (Status) -->
        <div id="view-status" class="hidden flex flex-col h-full p-4">
            <h1 class="text-xl font-bold text-white mb-6">动态</h1>
            <div class="flex items-center space-x-4 p-2 hover:bg-[#202c33] rounded-lg cursor-pointer">
                <div class="relative">
                    <div class="w-12 h-12 rounded-full border-2 border-emerald-500 p-0.5">
                        <div class="w-full h-full bg-gray-600 rounded-full flex items-center justify-center text-xs">ME</div>
                    </div>
                    <div class="absolute bottom-0 right-0 bg-emerald-500 rounded-full border-2 border-[#111b21] p-0.5"><i data-lucide="plus" class="w-3 h-3 text-white"></i></div>
                </div>
                <div>
                    <p class="font-medium text-white">我的动态</p>
                    <p class="text-xs text-[#8696a0]">点击更新您的动态</p>
                </div>
            </div>
            <p class="text-[13px] text-[#8696a0] mt-8 mb-4 px-2 uppercase font-semibold">最近更新</p>
            <div class="text-center py-20 opacity-40">
                <i data-lucide="circle-dashed" class="w-12 h-12 mx-auto mb-2"></i>
                <p>暂无好友更新</p>
            </div>
        </div>

        <!-- 社区视图 (Communities) -->
        <div id="view-communities" class="hidden flex flex-col h-full p-6 text-center space-y-4">
            <div class="w-32 h-32 bg-emerald-500/10 rounded-2xl mx-auto flex items-center justify-center">
                <i data-lucide="users" class="w-16 h-16 text-emerald-500"></i>
            </div>
            <h2 class="text-xl font-bold text-white">保持社区联系</h2>
            <p class="text-sm text-[#8696a0]">社区可以将成员归类在基于主题的小组中。您创建的任何社区都将显示在这里。</p>
            <button class="bg-emerald-600 text-black font-bold py-2 rounded-full mt-4">发起社区</button>
        </div>

        <!-- 拨号视图 (Calls) -->
        <div id="view-calls" class="hidden flex flex-col h-full">
             <header class="p-4 flex justify-between items-center">
                <h1 class="text-xl font-bold text-white">通话</h1>
                <i data-lucide="phone-call" class="w-5 h-5 text-[#aebac1]"></i>
            </header>
            <div class="flex-1 flex flex-col items-center justify-center opacity-40 text-sm">
                <i data-lucide="phone" class="w-12 h-12 mb-4"></i>
                <p>通过 WhatsApp 进行免费的安全通话</p>
            </div>
        </div>

    </aside>

    <!-- 伸缩柄 -->
    <div id="resizer"></div>

    <!-- 3. 聊天主界面 -->
    <main class="flex-1 flex flex-col relative bg-[#0b141a]">
        <div class="chat-wallpaper"></div>

        <header class="h-[60px] bg-[#202c33] flex items-center justify-between px-4 z-10">
            <div class="flex items-center space-x-3">
                <div id="chat-avatar" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-lg">?</div>
                <div>
                    <h2 id="chat-title" class="text-[16px] font-medium text-white leading-tight">请选择模型</h2>
                    <div id="chat-status-area" class="text-[12px] text-[#8696a0]">在线</div>
                </div>
            </div>
            <div class="flex items-center space-x-6 text-[#aebac1]">
                <i data-lucide="video" class="w-5 h-5 cursor-pointer hover:text-white transition-colors"></i>
                <i data-lucide="phone" class="w-5 h-5 cursor-pointer hover:text-white transition-colors"></i>
                <div class="w-[1px] h-6 bg-white/10"></div>
                <i data-lucide="search" class="w-5 h-5 cursor-pointer hover:text-white transition-colors"></i>
                <i data-lucide="more-vertical" class="w-5 h-5 cursor-pointer hover:text-white transition-colors"></i>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto px-8 md:px-16 py-6 space-y-2 relative z-10">
            <!-- 欢迎界面 -->
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-60">
                <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center">
                    <i data-lucide="message-square" class="w-12 h-12 text-emerald-500"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-light text-white">WhatsApp AI 枢纽</h2>
                    <p class="text-sm max-w-xs mx-auto">连接全球最顶尖且廉价的 AI 模型。您的所有对话均已加密。</p>
                </div>
                <div class="flex items-center text-xs space-x-1 text-[#8696a0]">
                    <i data-lucide="lock" class="w-3 h-3"></i>
                    <span>端到端加密</span>
                </div>
            </div>
        </div>

        <footer id="chat-footer" class="hidden min-h-[62px] bg-[#202c33] flex items-end px-4 py-2 space-x-3 z-10 border-t border-black/20">
            <div class="flex space-x-3 text-[#aebac1] pb-2">
                <i data-lucide="plus" class="w-6 h-6 cursor-pointer hover:text-white"></i>
                <i data-lucide="smile" class="w-6 h-6 cursor-pointer hover:text-white"></i>
            </div>
            <div class="flex-1 bg-[#2a3942] rounded-xl px-4 py-1.5 min-h-[42px] mb-1">
                <textarea id="chat-input" class="w-full bg-transparent max-h-[150px] outline-none text-[15px] text-white resize-none placeholder-[#8696a0] py-1" placeholder="输入消息" rows="1"></textarea>
            </div>
            <div class="pb-1.5">
                <button id="send-btn" class="p-2 text-[#8696a0] hover:text-emerald-500 transition-all">
                    <i data-lucide="send-horizontal" class="w-6 h-6"></i>
                </button>
            </div>
        </footer>
    </main>

    <!-- 设置与模型配置模态框 -->
    <div id="dev-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center hidden p-4">
        <div class="bg-[#202c33] w-full max-w-[450px] rounded-2xl shadow-2xl overflow-hidden border border-white/10 modal-enter">
            <div class="p-5 flex justify-between items-center border-b border-white/5">
                <h2 class="text-emerald-500 font-bold flex items-center gap-2">
                    <i data-lucide="cpu" class="w-5 h-5"></i> 模型配置
                </h2>
                <button id="close-modal" class="text-[#8696a0] hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="p-6 space-y-5">
                <div>
                    <label class="block text-[11px] text-[#00a884] font-bold uppercase mb-2 tracking-wider">显示名称</label>
                    <input id="char-name-input" type="text" class="w-full bg-[#2a3942] border-none rounded-lg py-3 px-4 outline-none text-white focus:ring-1 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-[11px] text-[#00a884] font-bold uppercase mb-2 tracking-wider">系统提示词 (System Prompt)</label>
                    <textarea id="sys-prompt-input" class="w-full bg-[#2a3942] border-none rounded-lg p-4 text-sm h-40 resize-none outline-none text-white focus:ring-1 focus:ring-emerald-500"></textarea>
                </div>
                <div class="flex gap-3">
                    <button id="save-btn" class="flex-1 bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-500 transition-all">更新配置</button>
                    <button id="clear-btn" class="px-4 py-3 text-red-400 hover:bg-red-400/10 rounded-lg transition-all border border-red-400/20"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAhd2QZhg_k0J5-A7BKgiM6oc5N2PwYz64",
        authDomain: "ashley-6f99c.firebaseapp.com",
        databaseURL: "https://ashley-6f99c-default-rtdb.firebaseio.com",
        projectId: "ashley-6f99c",
        storageBucket: "ashley-6f99c.firebasestorage.app",
        messagingSenderId: "210818892386",
        appId: "1:210818892386:web:3e631daf31baf1e91c873b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 模型列表：强调“廉价”与“性能”
    const MODELS = [
        { id: 'm_gpt4mini', name: "GPT-4o Mini", desc: "最强性价比，极速响应", prompt: "你是一个专业的智能助理，说话简洁高效。", cost: "$0.15/1M", color: "#10a37f" },
        { id: 'm_haiku', name: "Claude 3 Haiku", desc: "Anthropic 最快模型，逻辑严密", prompt: "你是一个优雅、博学的助手。", cost: "$0.25/1M", color: "#d97757" },
        { id: 'm_llama3', name: "Llama 3 8B", desc: "开源之王，极其聪明", prompt: "你是一个热情、直接的 AI。", cost: "$0.05/1M", color: "#0668e1" },
        { id: 'm_gemini', name: "Gemini 1.5 Flash", desc: "Google 最新极速模型", prompt: "你是一个善于联网搜索和多模态理解的助手。", cost: "$0.10/1M", color: "#4285f4" }
    ];

    let currentChatId = null;
    let chatHistory = {};
    let currentConfigs = {};

    const elements = {
        chatContainer: document.getElementById('chat-container'),
        chatInput: document.getElementById('chat-input'),
        sendBtn: document.getElementById('send-btn'),
        chatTitle: document.getElementById('chat-title'),
        chatAvatar: document.getElementById('chat-avatar'),
        chatStatus: document.getElementById('chat-status-area'),
        contactList: document.getElementById('contact-list'),
        sidebar: document.getElementById('sidebar'),
        resizer: document.getElementById('resizer'),
        devModal: document.getElementById('dev-modal'),
        chatFooter: document.getElementById('chat-footer'),
        welcome: document.getElementById('welcome-screen')
    };

    function init() {
        lucide.createIcons();
        setupResizer();
        renderModels();
        setupEventListeners();
    }

    // 视图切换逻辑 (Chats / Status / Communities / Calls)
    window.switchView = (viewName) => {
        const views = ['chats', 'status', 'communities', 'calls'];
        views.forEach(v => {
            document.getElementById(`view-${v}`).classList.add('hidden');
            document.getElementById(`nav-${v}`).classList.remove('active-nav-item');
        });
        document.getElementById(`view-${viewName}`).classList.remove('hidden');
        document.getElementById(`nav-${viewName}`).classList.add('active-nav-item');
    };

    // 侧边栏宽度拖拽
    function setupResizer() {
        let isResizing = false;
        elements.resizer.addEventListener('mousedown', () => isResizing = true);
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = e.clientX - 64;
            if (newWidth > 280 && newWidth < 550) {
                elements.sidebar.style.width = `${newWidth}px`;
            }
        });
        document.addEventListener('mouseup', () => isResizing = false);
    }

    function renderModels() {
        elements.contactList.innerHTML = '';
        MODELS.forEach(m => {
            const item = document.createElement('div');
            item.className = `flex items-center px-4 py-3 cursor-pointer hover:bg-[#202c33] transition-all group`;
            item.id = `item-${m.id}`;
            item.onclick = () => switchChat(m.id);
            item.innerHTML = `
                <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0 text-white font-bold shadow-lg" style="background-color: ${m.color}">
                    ${m.name[0]}
                </div>
                <div class="ml-3 flex-1 min-w-0 border-b border-white/5 pb-3">
                    <div class="flex justify-between items-baseline mb-0.5">
                        <span class="text-[16px] text-white font-medium truncate">${m.name}</span>
                        <span class="text-[11px] text-[#00a884] font-bold">${m.cost}</span>
                    </div>
                    <p class="text-[13px] text-[#8696a0] truncate" id="last-${m.id}">${m.desc}</p>
                </div>
            `;
            elements.contactList.appendChild(item);
        });
    }

    function switchChat(chatId) {
        currentChatId = chatId;
        elements.welcome.classList.add('hidden');
        elements.chatFooter.classList.remove('hidden');

        const m = MODELS.find(x => x.id === chatId);
        elements.chatTitle.textContent = m.name;
        elements.chatAvatar.textContent = m.name[0];
        elements.chatAvatar.style.backgroundColor = m.color;

        document.querySelectorAll('#contact-list > div').forEach(el => el.classList.remove('active-chat'));
        document.getElementById(`item-${chatId}`).classList.add('active-chat');

        syncFirebase(chatId);
    }

    function syncFirebase(chatId) {
        // 监听配置
        onValue(ref(db, `configs/${chatId}`), (snap) => {
            const config = snap.val() || { name: MODELS.find(x=>x.id===chatId).name, prompt: MODELS.find(x=>x.id===chatId).prompt };
            currentConfigs[chatId] = config;
            if(chatId === currentChatId) elements.chatTitle.textContent = config.name;
        });

        // 监听消息
        onValue(ref(db, `messages/${chatId}`), (snap) => {
            const data = snap.val();
            const msgs = data ? Object.values(data).sort((a,b) => a.timestamp - b.timestamp) : [];
            chatHistory[chatId] = msgs;
            if (chatId === currentChatId) renderMessages(msgs);
            
            if(msgs.length > 0) {
                const last = msgs[msgs.length - 1].text;
                document.getElementById(`last-${chatId}`).textContent = last.substring(0, 30);
            }
        });
    }

    function renderMessages(msgs) {
        elements.chatContainer.innerHTML = '';
        msgs.forEach(msg => {
            const isUser = msg.role === 'user';
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full mb-1 group`;
            div.innerHTML = `
                <div class="relative px-3 py-1.5 max-w-[85%] shadow-md rounded-lg ${isUser ? 'bubble-right bg-[#005c4b]' : 'bubble-left bg-[#202c33]'}">
                    <p class="text-[14.5px] text-[#e9edef] whitespace-pre-wrap pr-12 leading-relaxed">${msg.text}</p>
                    <div class="absolute bottom-1 right-2 flex items-center space-x-1">
                        <span class="text-[9px] text-[#8696a0]">${time}</span>
                        ${isUser ? '<i data-lucide="check-check" class="w-3.5 h-3.5 text-[#53bdeb]"></i>' : ''}
                    </div>
                </div>
            `;
            elements.chatContainer.appendChild(div);
        });
        lucide.createIcons({ root: elements.chatContainer });
        elements.chatContainer.scrollTop = elements.chatContainer.scrollHeight;
    }

    async function sendMessage() {
        const text = elements.chatInput.value.trim();
        if (!text || !currentChatId) return;

        elements.chatInput.value = '';
        elements.chatInput.style.height = 'auto';

        push(ref(db, `messages/${currentChatId}`), { role: 'user', text, timestamp: Date.now() });

        setTyping(true);
        try {
            const config = currentConfigs[currentChatId];
            const context = [
                { role: 'system', content: config.prompt },
                ...(chatHistory[currentChatId] || []).slice(-10).map(m => ({
                    role: m.role === 'assistant' ? 'assistant' : 'user',
                    content: m.text
                })),
                { role: 'user', content: text }
            ];

            const response = await puter.ai.chat(context, { model: 'gpt-4o-mini' });
            let reply = typeof response === 'string' ? response : (response.message?.content || "...");
            push(ref(db, `messages/${currentChatId}`), { role: 'assistant', text: reply, timestamp: Date.now() });
        } catch (e) { console.error(e); }
        setTyping(false);
    }

    function setTyping(status) {
        if (status) {
            elements.chatStatus.innerHTML = `正在输入<span class="inline-flex ml-1"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></span>`;
            elements.chatStatus.classList.add('text-emerald-500');
        } else {
            elements.chatStatus.textContent = '在线';
            elements.chatStatus.classList.remove('text-emerald-500');
        }
    }

    function setupEventListeners() {
        elements.sendBtn.onclick = sendMessage;
        elements.chatInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        };

        document.getElementById('settings-trigger').onclick = () => {
            if(!currentChatId) return;
            const c = currentConfigs[currentChatId];
            document.getElementById('char-name-input').value = c.name;
            document.getElementById('sys-prompt-input').value = c.prompt;
            elements.devModal.classList.remove('hidden');
        };

        document.getElementById('close-modal').onclick = () => elements.devModal.classList.add('hidden');
        
        document.getElementById('save-btn').onclick = () => {
            const name = document.getElementById('char-name-input').value;
            const prompt = document.getElementById('sys-prompt-input').value;
            update(ref(db, `configs/${currentChatId}`), { name, prompt });
            elements.devModal.classList.add('hidden');
        };

        document.getElementById('clear-btn').onclick = () => {
            if(confirm("清除此模型的聊天记录？")) {
                remove(ref(db, `messages/${currentChatId}`));
                elements.devModal.classList.add('hidden');
            }
        };

        elements.chatInput.oninput = function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        };
    }

    init();
</script>
</body>
</html>
