<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw AI - 自然人声版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --wa-bg-deep: #0c1317;
            --wa-panel-bg: rgba(17, 27, 33, 0.85);
            --wa-sidebar-bg: #202c33;
            --wa-chat-bg: #0b141a;
            --wa-header-bg: rgba(32, 44, 51, 0.9);
            --wa-input-bg: #2a3942;
            --wa-bubble-self: #005c4b;
            --wa-bubble-other: #202c33;
            --wa-text-primary: #e9edef;
            --wa-text-secondary: #8696a0;
            --wa-accent: #00a884;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: black;
            color: var(--wa-text-primary);
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        /* 闪屏效果 */
        #splash-screen {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }
        .brand-text {
            font-family: 'Alex Brush', cursive; font-size: 5rem; color: white;
            margin-bottom: 2rem; text-shadow: 0 0 20px rgba(255,255,255,0.3);
            animation: textPulse 2s ease-in-out infinite;
        }
        @keyframes textPulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.02); } }
        .progress-container { width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: white; box-shadow: 0 0 10px white; transition: width 0.1s linear; }

        /* 呼吸灯效果 */
        @keyframes avatarPulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 163, 127, 0.6); }
            70% { box-shadow: 0 0 0 40px rgba(16, 163, 127, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 163, 127, 0); }
        }
        .speaking-pulse { animation: avatarPulse 1.5s infinite; border-color: #10a37f !important; }

        /* 气泡样式 */
        .bubble-left::before { content: ""; position: absolute; top: 0; left: -8px; width: 8px; height: 13px; background: var(--wa-bubble-other); clip-path: polygon(100% 0, 0 0, 100% 100%); }
        .bubble-right::after { content: ""; position: absolute; top: 0; right: -8px; width: 8px; height: 13px; background: var(--wa-bubble-self); clip-path: polygon(0 0, 100% 0, 0 100%); }

        #resizer { width: 2px; cursor: col-resize; background: transparent; transition: background 0.3s; z-index: 50; }
        #resizer:hover { background: var(--wa-accent); }

        .active-nav-item { color: #00a884 !important; background: rgba(55, 66, 72, 0.4); }
    </style>
</head>
<body class="flex">

    <!-- 闪屏 -->
    <div id="splash-screen">
        <h1 class="brand-text">OpenClaw</h1>
        <div class="progress-container"><div id="splash-bar" class="progress-bar"></div></div>
        <p class="text-white/30 text-[10px] uppercase tracking-[0.3em] mt-8">正在加载高级语音模块...</p>
    </div>

    <!-- 左侧导航栏 -->
    <nav class="w-[64px] bg-[#202c33] flex flex-col items-center py-4 space-y-4 shrink-0 border-r border-white/5 z-50">
        <div onclick="switchView('chats')" id="nav-chats" class="active-nav-item p-3 text-[#aebac1] hover:bg-[#374248] rounded-xl cursor-pointer">
            <i data-lucide="message-square" class="w-6 h-6"></i>
        </div>
        <div onclick="switchView('calls')" id="nav-calls" class="p-3 text-[#aebac1] hover:bg-[#374248] rounded-xl cursor-pointer">
            <i data-lucide="phone" class="w-6 h-6"></i>
        </div>
        <div class="flex-1"></div>
        <div id="settings-trigger" class="p-3 text-[#aebac1] hover:bg-[#374248] rounded-xl cursor-pointer">
            <i data-lucide="settings" class="w-6 h-6"></i>
        </div>
        <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center font-bold text-xs">AI</div>
    </nav>

    <!-- 联系人列表 -->
    <aside id="sidebar" class="w-[350px] min-w-[280px] flex flex-col shrink-0 bg-[#111b21] border-r border-white/10 relative overflow-hidden">
        <div id="view-chats" class="flex flex-col h-full">
            <header class="p-4">
                <h1 class="text-xl font-bold text-white mb-4">聊天</h1>
                <div class="bg-[#202c33] h-10 rounded-xl flex items-center px-3">
                    <i data-lucide="search" class="w-4 h-4 text-[#8696a0] mr-3"></i>
                    <input type="text" placeholder="搜索模型..." class="bg-transparent text-sm w-full outline-none text-white">
                </div>
            </header>
            <div id="contact-list" class="flex-1 overflow-y-auto"></div>
        </div>
        <div id="view-calls" class="hidden flex flex-col h-full p-8 text-center justify-center text-[#8696a0]">
            <i data-lucide="phone" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
            <p>通话历史将显示在这里</p>
        </div>
    </aside>

    <div id="resizer"></div>

    <!-- 主聊天窗口 -->
    <main class="flex-1 flex flex-col relative bg-[#0b141a]">
        <header id="chat-header" class="h-[60px] bg-[#202c33] flex items-center justify-between px-4 z-10 border-b border-white/5 hidden">
            <div class="flex items-center space-x-3">
                <div id="chat-avatar" class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold">?</div>
                <div>
                    <h2 id="chat-title" class="text-[16px] font-semibold text-white">模型名称</h2>
                    <div id="chat-status" class="text-[12px] text-emerald-500">在线</div>
                </div>
            </div>
            <div class="flex items-center space-x-5 text-[#aebac1]">
                <button id="start-call-btn" class="p-2 hover:bg-white/10 rounded-full text-emerald-500">
                    <i data-lucide="phone" class="w-6 h-6"></i>
                </button>
                <i data-lucide="more-vertical" class="w-5 h-5 cursor-pointer"></i>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto px-6 py-6 space-y-4 relative z-10">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center opacity-40">
                <i data-lucide="message-square" class="w-16 h-16 mb-4"></i>
                <h2 class="text-2xl font-bold">OpenClaw Natural Voice</h2>
                <p>选择一个模型开始自然语音通话</p>
            </div>
        </div>

        <footer id="chat-footer" class="hidden min-h-[62px] bg-[#202c33] flex items-end px-4 py-3 space-x-3 z-10">
            <i data-lucide="plus" class="w-6 h-6 text-[#aebac1] cursor-pointer mb-2"></i>
            <div class="flex-1 bg-[#2a3942] rounded-2xl px-4 py-2">
                <textarea id="chat-input" class="w-full bg-transparent outline-none text-white resize-none py-1" placeholder="输入消息..." rows="1"></textarea>
            </div>
            <button id="send-btn" class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-black mb-1">
                <i data-lucide="send-horizontal" class="w-5 h-5"></i>
            </button>
        </footer>
    </main>

    <!-- 语音通话界面 -->
    <div id="call-modal" class="fixed inset-0 z-[200] bg-[#0b141a] flex flex-col items-center justify-center hidden">
        <div class="flex flex-col items-center mb-16">
            <div id="call-avatar-large" class="w-40 h-40 rounded-full flex items-center justify-center text-white text-5xl font-bold border-4 border-white/10 mb-8 transition-all duration-500">?</div>
            <h2 id="call-name" class="text-3xl font-bold text-white mb-2">AI 模型</h2>
            <p id="call-status-text" class="text-emerald-500 font-mono text-sm tracking-widest">正在连接...</p>
        </div>
        
        <div class="w-[80%] max-w-xl text-center h-24 flex items-center justify-center">
            <p id="call-transcript" class="text-xl text-[#8696a0] italic"></p>
        </div>

        <div class="absolute bottom-20 flex space-x-12 items-center">
            <button id="call-mic-toggle" class="w-14 h-14 bg-white/10 rounded-full flex items-center justify-center text-white hover:bg-white/20">
                <i data-lucide="mic" class="w-6 h-6"></i>
            </button>
            <button id="end-call-btn" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center text-white hover:bg-red-600 shadow-xl shadow-red-500/20">
                <i data-lucide="phone-off" class="w-8 h-8"></i>
            </button>
            <button class="w-14 h-14 bg-white/10 rounded-full flex items-center justify-center text-white">
                <i data-lucide="volume-2" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <!-- 配置弹窗 -->
    <div id="dev-modal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center hidden">
        <div class="bg-[#202c33] w-full max-w-md rounded-3xl p-8 space-y-6 border border-white/10">
            <h2 class="text-xl font-bold">设定助手身份</h2>
            <input id="char-name-input" type="text" placeholder="名称" class="w-full bg-[#2a3942] rounded-xl p-4 outline-none text-white">
            <textarea id="sys-prompt-input" placeholder="系统提示词 (Persona)" class="w-full bg-[#2a3942] rounded-xl p-4 h-40 outline-none text-white resize-none"></textarea>
            <div class="flex gap-4">
                <button id="save-btn" class="flex-1 bg-emerald-600 text-black font-bold py-3 rounded-xl">保存</button>
                <button id="close-modal" class="px-6 py-3 bg-white/5 rounded-xl">关闭</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, update, remove, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAhd2QZhg_k0J5-A7BKgiM6oc5N2PwYz64",
        authDomain: "ashley-6f99c.firebaseapp.com",
        databaseURL: "https://ashley-6f99c-default-rtdb.firebaseio.com",
        projectId: "ashley-6f99c",
        storageBucket: "ashley-6f99c.firebasestorage.app",
        messagingSenderId: "210818892386",
        appId: "1:210818892386:web:3e631daf31baf1e91c873b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const MODELS = [
        { id: 'm1', name: "GPT-4o Mini", color: "#10a37f", prompt: "你是一个温柔、声音动听的助手。回答要简洁，适合口语交流。" },
        { id: 'm2', name: "Claude Haiku", color: "#d97757", prompt: "你是一个专业的助手。说话要自然，像真正的人一样。" },
        { id: 'm3', name: "Llama 3", color: "#0668e1", prompt: "你是一个幽默的朋友。说话带点俏皮，非常接地气。" }
    ];

    let currentChatId = null;
    let isCalling = false;
    let recognition = null;
    let currentConfigs = {};

    // --- 高级自然语音合成 (Gemini 2.5 TTS) ---
    async function playNaturalVoice(text) {
        if (!isCalling) return;
        
        try {
            document.getElementById('call-status-text').textContent = "正在思考并回答...";
            document.getElementById('call-avatar-large').classList.add('speaking-pulse');

            const apiKey = ""; // 环境自动注入
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: {
                            voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } // Kore 声音非常自然
                        }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                })
            });

            const result = await response.json();
            const pcmBase64 = result.candidates[0].content.parts[0].inlineData.data;
            const sampleRate = parseInt(result.candidates[0].content.parts[0].inlineData.mimeType.match(/rate=(\d+)/)?.[1] || "24000");

            // PCM 转换为 WAV
            const wavBlob = pcmToWav(pcmBase64, sampleRate);
            const audioUrl = URL.createObjectURL(wavBlob);
            const audio = new Audio(audioUrl);

            audio.onended = () => {
                document.getElementById('call-avatar-large').classList.remove('speaking-pulse');
                if (isCalling) recognition.start(); // 回答完继续听
            };
            audio.play();

        } catch (e) {
            console.error("TTS Error:", e);
            document.getElementById('call-avatar-large').classList.remove('speaking-pulse');
        }
    }

    function pcmToWav(base64, sampleRate) {
        const buffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
        const wav = new ArrayBuffer(44 + buffer.byteLength);
        const view = new DataView(wav);
        const writeString = (offset, string) => { for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i)); };
        writeString(0, 'RIFF'); view.setUint32(4, 36 + buffer.byteLength, true); writeString(8, 'WAVE');
        writeString(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
        view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeString(36, 'data');
        view.setUint32(40, buffer.byteLength, true);
        new Uint8Array(wav, 44).set(new Uint8Array(buffer));
        return new Blob([wav], { type: 'audio/wav' });
    }

    // --- 初始化功能 ---
    function init() {
        lucide.createIcons();
        renderModels();
        setupSpeech();
        
        let p = 0;
        const bar = document.getElementById('splash-bar');
        const iv = setInterval(() => {
            p += 5; bar.style.width = p + '%';
            if (p >= 100) { clearInterval(iv); document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => document.getElementById('splash-screen').style.display = 'none', 800); }
        }, 30);
    }

    function setupSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.lang = 'zh-CN';

            recognition.onstart = () => { if(isCalling) document.getElementById('call-status-text').textContent = "正在倾听..."; };

            recognition.onresult = (e) => {
                const text = Array.from(e.results).map(r => r[0].transcript).join('');
                document.getElementById('call-transcript').textContent = text;
                if(e.results[0].isFinal && isCalling) {
                    recognition.stop();
                    document.getElementById('call-status-text').textContent = "正在思考...";
                    sendMessage(text);
                }
            };

            recognition.onend = () => {
                if(isCalling && document.getElementById('call-status-text').textContent === "正在倾听...") {
                    recognition.start();
                }
            };
        }
    }

    function renderModels() {
        const list = document.getElementById('contact-list');
        MODELS.forEach(m => {
            const div = document.createElement('div');
            div.className = "flex items-center p-4 cursor-pointer hover:bg-white/5 transition-all active:scale-95";
            div.onclick = () => switchChat(m.id);
            div.innerHTML = `
                <div class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold shrink-0" style="background:${m.color}">${m.name[0]}</div>
                <div class="ml-4 flex-1">
                    <p class="text-white font-semibold text-sm">${m.name}</p>
                    <p class="text-[11px] text-[#8696a0]">点击进入通话或聊天</p>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function switchChat(id) {
        currentChatId = id;
        const model = MODELS.find(m => m.id === id);
        document.getElementById('chat-header').classList.remove('hidden');
        document.getElementById('chat-footer').classList.remove('hidden');
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('chat-title').textContent = model.name;
        document.getElementById('chat-avatar').textContent = model.name[0];
        document.getElementById('chat-avatar').style.background = model.color;
        syncChat(id);
    }

    function syncChat(id) {
        onValue(ref(db, `configs/${id}`), (snap) => {
            currentConfigs[id] = snap.val() || MODELS.find(m => m.id === id);
            if(currentChatId === id) document.getElementById('chat-title').textContent = currentConfigs[id].name;
        });
        const msgQuery = query(ref(db, `messages/${id}`), limitToLast(30));
        onValue(msgQuery, (snap) => {
            const data = snap.val();
            const msgs = data ? Object.values(data).sort((a,b) => a.timestamp - b.timestamp) : [];
            if(currentChatId === id && !isCalling) renderMessages(msgs);
        });
    }

    function renderMessages(msgs) {
        const container = document.getElementById('chat-container');
        container.innerHTML = '';
        msgs.forEach(m => {
            const isUser = m.role === 'user';
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full mb-2`;
            div.innerHTML = `<div class="relative px-4 py-2 max-w-[80%] rounded-xl ${isUser ? 'bubble-right bg-[#005c4b]' : 'bubble-left bg-[#202c33]'}"><p class="text-sm">${m.text}</p></div>`;
            container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage(overrideText = null) {
        const text = overrideText || document.getElementById('chat-input').value.trim();
        if(!text) return;
        if(!overrideText) document.getElementById('chat-input').value = '';

        const config = currentConfigs[currentChatId];
        push(ref(db, `messages/${currentChatId}`), { role: 'user', text, timestamp: Date.now() });

        try {
            const res = await puter.ai.chat([
                { role: 'system', content: config.prompt + (isCalling ? "。注意：现在是语音通话，你的回答必须非常简短（20字以内），不要使用Markdown或特殊符号。" : "") },
                { role: 'user', content: text }
            ]);
            const aiText = typeof res === 'string' ? res : res.message.content;
            push(ref(db, `messages/${currentChatId}`), { role: 'assistant', text: aiText, timestamp: Date.now() });
            
            if(isCalling) playNaturalVoice(aiText);
        } catch(e) { console.error(e); }
    }

    // 通话逻辑
    document.getElementById('start-call-btn').onclick = () => {
        const model = MODELS.find(m => m.id === currentChatId);
        isCalling = true;
        document.getElementById('call-modal').classList.remove('hidden');
        document.getElementById('call-name').textContent = currentConfigs[currentChatId].name;
        document.getElementById('call-avatar-large').textContent = model.name[0];
        document.getElementById('call-avatar-large').style.background = model.color;
        if(recognition) recognition.start();
    };

    document.getElementById('end-call-btn').onclick = () => {
        isCalling = false;
        document.getElementById('call-modal').classList.add('hidden');
        if(recognition) recognition.stop();
        window.speechSynthesis.cancel();
    };

    // 设置与缩放
    let resizing = false;
    document.getElementById('resizer').onmousedown = () => resizing = true;
    document.onmousemove = (e) => {
        if(!resizing) return;
        const w = e.clientX - 64;
        if(w > 200 && w < 500) document.getElementById('sidebar').style.width = w + 'px';
    };
    document.onmouseup = () => resizing = false;

    document.getElementById('settings-trigger').onclick = () => {
        if(!currentChatId) return;
        document.getElementById('char-name-input').value = currentConfigs[currentChatId].name;
        document.getElementById('sys-prompt-input').value = currentConfigs[currentChatId].prompt;
        document.getElementById('dev-modal').classList.remove('hidden');
    };
    document.getElementById('close-modal').onclick = () => document.getElementById('dev-modal').classList.add('hidden');
    document.getElementById('save-btn').onclick = () => {
        update(ref(db, `configs/${currentChatId}`), { name: document.getElementById('char-name-input').value, prompt: document.getElementById('sys-prompt-input').value });
        document.getElementById('dev-modal').classList.add('hidden');
    };

    document.getElementById('send-btn').onclick = () => sendMessage();
    document.getElementById('chat-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

    window.switchView = (v) => {
        ['chats', 'calls'].forEach(x => {
            document.getElementById('view-'+x).classList.toggle('hidden', x !== v);
            document.getElementById('nav-'+x).classList.toggle('active-nav-item', x === v);
        });
    };

    init();
</script>
</body>
</html>
