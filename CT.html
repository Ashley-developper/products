<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp RTDB Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --wa-bg-chat: #efeae2;
            --wa-bubble-self: #d9fdd3;
        }
        body { background-color: #0c1317; height: 100vh; width: 100vw; overflow: hidden; margin: 0; }
        .chat-wallpaper {
            background-color: var(--wa-bg-chat);
            background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
            background-blend-mode: overlay;
        }
        .bubble-left::before {
            content: ""; position: absolute; top: 0; left: -8px;
            width: 0; height: 0; border-style: solid;
            border-width: 0 10px 10px 0; border-color: transparent #ffffff transparent transparent;
        }
        .bubble-right::after {
            content: ""; position: absolute; top: 0; right: -8px;
            width: 0; height: 0; border-style: solid;
            border-width: 0 0 10px 10px; border-color: transparent transparent transparent #d9fdd3;
        }
        .hidden-el { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
    </style>
</head>
<body class="flex items-center justify-center">

    <div class="w-full h-full flex bg-white overflow-hidden shadow-none">
        <!-- 1. Left Nav -->
        <nav class="w-[64px] bg-[#202c33] flex flex-col items-center py-4 space-y-5 shrink-0">
            <div class="w-9 h-9 bg-gray-500 rounded-full flex items-center justify-center overflow-hidden"><i data-lucide="user" class="text-white w-6 h-6"></i></div>
            <div class="p-2 bg-[#374248] rounded-full text-white cursor-pointer"><i data-lucide="message-square" class="w-6 h-6"></i></div>
            <div class="flex-1"></div>
            <div class="p-2 text-[#aebac1] hover:bg-[#374248] rounded-full cursor-pointer" id="settings-trigger"><i data-lucide="settings" class="w-6 h-6"></i></div>
        </nav>

        <!-- 2. Sidebar -->
        <aside class="w-[380px] border-r border-[#d1d7db] flex flex-col shrink-0 bg-white">
            <header class="p-4 flex flex-col space-y-4">
                <h1 class="text-[22px] font-bold text-[#111b21]">WhatsAPP</h1>
                <div class="bg-[#f0f2f5] h-9 rounded-lg flex items-center px-3">
                    <i data-lucide="search" class="w-4 h-4 text-[#54656f] mr-4"></i>
                    <input type="text" placeholder="Search..." class="bg-transparent text-[14px] w-full outline-none">
                </div>
            </header>
            <div class="flex-1 overflow-y-auto">
                <div class="bg-[#f0f2f5] px-4 py-3 flex items-center space-x-3 cursor-pointer">
                    <div class="w-12 h-12 bg-emerald-600 rounded-full flex items-center justify-center shrink-0"><i data-lucide="bot" class="text-white w-7 h-7"></i></div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline">
                            <span id="list-name" class="text-[17px] font-medium text-[#111b21]">AI Companion</span>
                            <span class="text-[12px] text-[#00a884]">Online</span>
                        </div>
                        <p id="list-preview" class="text-[14px] text-[#667781] truncate">Waiting for messages...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 3. Main Chat -->
        <main class="flex-1 flex flex-col relative bg-[#f0f2f5]">
            <header class="h-[60px] bg-[#f0f2f5] flex items-center justify-between px-4 border-b border-[#d1d7db]">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center"><i data-lucide="bot" class="text-white w-6 h-6"></i></div>
                    <div>
                        <h2 id="chat-title" class="text-[16px] font-medium text-[#111b21]">AI Companion</h2>
                        <p id="chat-status" class="text-[12px] text-[#667781]">online</p>
                    </div>
                </div>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto px-12 py-6 space-y-3 chat-wallpaper relative"></div>

            <footer class="min-h-[62px] bg-[#f0f2f5] flex items-end px-4 py-3 space-x-2">
                <div class="flex-1 flex items-center bg-white rounded-xl px-4 min-h-[44px] shadow-sm">
                    <textarea id="chat-input" class="w-full bg-transparent max-h-[150px] py-2.5 outline-none text-[15px] resize-none" placeholder="Type a message" rows="1"></textarea>
                </div>
                <button id="send-btn" class="p-2 text-[#00a884] hover:bg-[#d1d7db] rounded-full transition-all">
                    <i data-lucide="send-horizontal" class="w-6 h-6"></i>
                </button>
            </footer>
        </main>

        <!-- Config Modal -->
        <div id="dev-modal" class="absolute inset-0 z-50 bg-[#0c1317]/85 flex items-center justify-center hidden-el">
            <div class="bg-white w-[500px] rounded-2xl shadow-2xl overflow-hidden">
                <div class="bg-[#008069] p-5 text-white flex justify-between items-center">
                    <h2 class="text-lg font-semibold uppercase tracking-widest">Character Memory Settings</h2>
                    <button id="close-modal"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="p-8 space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-[#008069] mb-2">CHARACTER NAME</label>
                        <input id="char-name-input" type="text" class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-[#00a884]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-[#008069] mb-2">SYSTEM PERSONALITY (MEMORY)</label>
                        <textarea id="sys-prompt-input" class="w-full bg-gray-50 border border-gray-200 p-4 rounded-xl text-sm h-48 resize-none outline-none focus:ring-2 focus:ring-[#00a884]"></textarea>
                    </div>
                    <div class="flex gap-4">
                        <button id="save-btn" class="flex-1 bg-[#00a884] text-white py-4 rounded-xl shadow-lg hover:bg-[#008069] font-bold">SAVE TO CLOUD</button>
                        <button id="clear-btn" class="px-6 py-4 text-red-500 hover:bg-red-50 rounded-xl font-semibold">RESET HISTORY</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    // --- 1. Firebase RTDB Integration ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAhd2QZhg_k0J5-A7BKgiM6oc5N2PwYz64",
        authDomain: "ashley-6f99c.firebaseapp.com",
        databaseURL: "https://ashley-6f99c-default-rtdb.firebaseio.com",
        projectId: "ashley-6f99c",
        storageBucket: "ashley-6f99c.firebasestorage.app",
        messagingSenderId: "210818892386",
        appId: "1:210818892386:web:3e631daf31baf1e91c873b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- 2. State & Elements ---
    let messages = [];
    let characterName = "AI Companion";
    let systemPrompt = "You are a friendly person on WhatsApp. Be concise and use emojis.";

    const chatContainer = document.getElementById('chat-container');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const chatTitle = document.getElementById('chat-title');
    const listName = document.getElementById('list-name');
    const devModal = document.getElementById('dev-modal');

    // --- 3. Initial Load from Firebase ---
    function init() {
        lucide.createIcons();
        
        // Listen for Character Config
        onValue(ref(db, 'config'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                characterName = data.name || characterName;
                systemPrompt = data.prompt || systemPrompt;
                chatTitle.textContent = characterName;
                listName.textContent = characterName;
                document.getElementById('char-name-input').value = characterName;
                document.getElementById('sys-prompt-input').value = systemPrompt;
            }
        });

        // Listen for Messages
        onValue(ref(db, 'messages'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                messages = Object.entries(data).map(([id, val]) => ({ id, ...val }));
                messages.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            } else {
                messages = [];
            }
            renderMessages();
        });

        setupEvents();
    }

    function renderMessages() {
        chatContainer.innerHTML = '';
        messages.forEach(msg => {
            const isUser = msg.role === 'user';
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full mb-3`;
            const time = new Date(msg.timestamp || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            div.innerHTML = `
                <div class="relative px-3 py-1.5 max-w-[85%] shadow-sm ${isUser ? 'bubble-right bg-[#d9fdd3]' : 'bubble-left bg-white text-[#111b21]'}">
                    <div class="text-[14.5px] whitespace-pre-wrap pb-1 pr-12">${msg.text || ''}</div>
                    <div class="absolute bottom-1 right-2 flex items-center space-x-1">
                        <span class="text-[10px] text-[#667781]">${time}</span>
                        ${isUser ? '<i data-lucide="check-check" class="w-3.5 h-3.5 text-[#53bdeb]"></i>' : ''}
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
        });
        lucide.createIcons({ root: chatContainer });
        chatContainer.scrollTop = chatContainer.scrollHeight;
        
        if (messages.length > 0) {
            const lastMsg = messages[messages.length - 1].text || '';
            document.getElementById('list-preview').textContent = lastMsg.substring(0, 30) + (lastMsg.length > 30 ? '...' : '');
        }
    }

    async function handleSend() {
        const text = chatInput.value.trim();
        if (!text) return;

        chatInput.value = '';
        chatInput.style.height = 'auto';

        // 1. Save User Message to RTDB
        const userMsg = { role: 'user', text: text, timestamp: Date.now() };
        try {
            push(ref(db, 'messages'), userMsg);
        } catch (e) {
            console.error("Firebase push error:", e);
        }

        document.getElementById('chat-status').textContent = 'typing...';

        try {
            // 2. Prepare Context for Puter AI
            // 核心修复：确保 systemPrompt 永远是第一条，并且是最新的
            const context = [
                { role: 'system', content: systemPrompt },
                ...messages.slice(-15).map(m => ({
                    role: m.role === 'assistant' ? 'assistant' : 'user',
                    content: m.text || ''
                })),
                { role: 'user', content: text }
            ];

            const response = await puter.ai.chat(context, { model: 'gpt-4o-mini' });
            
            let reply = "";
            if (typeof response === 'string') {
                reply = response;
            } else if (response && response.message && response.message.content) {
                reply = response.message.content;
            }

            if (!reply) throw new Error("Empty response");

            // 3. Save Assistant Reply to RTDB
            push(ref(db, 'messages'), { role: 'assistant', text: reply, timestamp: Date.now() });
            document.getElementById('chat-status').textContent = 'online';
        } catch (err) {
            console.error("AI Error:", err);
            document.getElementById('chat-status').textContent = 'online';
        }
    }

    function setupEvents() {
        sendBtn.onclick = handleSend;
        chatInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        };

        // Hotkey Y to open settings
        window.onkeydown = (e) => {
            if (e.key.toLowerCase() === 'y' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                devModal.classList.remove('hidden-el');
            }
        };

        document.getElementById('settings-trigger').onclick = () => devModal.classList.remove('hidden-el');
        document.getElementById('close-modal').onclick = () => devModal.classList.add('hidden-el');

        // Save Config to Firebase
        document.getElementById('save-btn').onclick = () => {
            const name = document.getElementById('char-name-input').value;
            const prompt = document.getElementById('sys-prompt-input').value;
            set(ref(db, 'config'), { name, prompt }).then(() => {
                // 更新本地变量以确保下次 handleSend 立即生效
                characterName = name;
                systemPrompt = prompt;
                devModal.classList.add('hidden-el');
            });
        };

        // Clear Chat in Firebase
        document.getElementById('clear-btn').onclick = () => {
            if(confirm("Are you sure you want to clear chat history?")) {
                remove(ref(db, 'messages'));
                devModal.classList.add('hidden-el');
            }
        };
    }

    init();
</script>
</body>
</html>
