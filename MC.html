<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Minecraft Clone - Pro Performance</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.9);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        
        #info-panel {
            background: rgba(0, 0, 0, 0.5); color: white; padding: 15px; border-bottom-right-radius: 10px;
            backdrop-filter: blur(4px); text-shadow: 1px 1px 0 #000; width: max-content;
        }
        
        #toolbar {
            display: flex; justify-content: center; gap: 5px; padding-bottom: 20px; flex-wrap: wrap; max-width: 600px; margin: 0 auto;
        }
        .slot {
            width: 45px; height: 45px; border: 3px solid rgba(255, 255, 255, 0.3); background: rgba(0, 0, 0, 0.4);
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .slot.active { border-color: #fff; transform: translateY(-5px); box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .slot::after {
            content: attr(data-key); position: absolute; top: 2px; left: 4px; font-size: 12px; opacity: 0.7;
        }
        .slot-img { width: 32px; height: 32px; image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui-layer">
        <div id="info-panel">
            <h3 style="margin:0 0 10px 0; color: #a4e4ff;">无限视界 - 性能增强版</h3>
            <b>[点击屏幕任意位置开始]</b><br><br>
            WASD: 移动 | Space: 跳跃/游泳 | Shift: 冲刺<br>
            左键: 破坏 | 右键: 放置方块<br>
            数字键 1-8: 切换手持方块
        </div>
        <div id="toolbar">
            <div class="slot active" id="slot-1" data-key="1"><canvas class="slot-img" id="icon-1"></canvas></div>
            <div class="slot" id="slot-2" data-key="2"><canvas class="slot-img" id="icon-2"></canvas></div>
            <div class="slot" id="slot-3" data-key="3"><canvas class="slot-img" id="icon-3"></canvas></div>
            <div class="slot" id="slot-4" data-key="4"><canvas class="slot-img" id="icon-4"></canvas></div>
            <div class="slot" id="slot-5" data-key="5"><canvas class="slot-img" id="icon-5"></canvas></div>
            <div class="slot" id="slot-6" data-key="6"><canvas class="slot-img" id="icon-6"></canvas></div>
            <div class="slot" id="slot-7" data-key="7"><canvas class="slot-img" id="icon-7"></canvas></div>
            <div class="slot" id="slot-8" data-key="8"><canvas class="slot-img" id="icon-8"></canvas></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { SimplexNoise } from 'three/addons/math/SimplexNoise.js';

        // ==========================================
        // 1. 核心参数与全局配置
        // ==========================================
        const CONFIG = {
            worldSize: 128,
            maxHeight: 24,
            waterLevel: 8,
            gravity: 28.0,
            jumpForce: 9.5,
            moveSpeed: 7.0,
            sprintMulti: 1.6,
            playerHeight: 1.8,
            playerEyeHeight: 1.6,
            playerHalfW: 0.3,
            reachDistance: 7,
            chunkSize: 16 // 性能优化的核心：分块加载
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: false, 
            powerPreference: "high-performance",
            precision: "lowp" // 移动端性能极大提升
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); // 锁定像素比保证性能
        renderer.shadowMap.enabled = false; // 关闭阴影以换取 60FPS+
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // ==========================================
        // 2. 纹理与材质
        // ==========================================
        function createTexture(baseColor, noiseColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, 16, 16);
            for (let i = 0; i < 40; i++) {
                ctx.fillStyle = noiseColor;
                ctx.fillRect(Math.floor(Math.random()*16), Math.floor(Math.random()*16), 1, 1);
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            return { tex, canvas };
        }

        const texData = {
            1: createTexture('#5e9e3d', '#4d8a2e'), // Grass
            2: createTexture('#8b5a2b', '#6d4621'), // Dirt
            3: createTexture('#808080', '#696969'), // Stone
            4: createTexture('#5c4033', '#3e2723'), // Wood
            5: createTexture('#2d5a27', '#1e3f1b'), // Leaves
            6: createTexture('#e3c988', '#d1b675'), // Sand
            7: createTexture('#3f8cc7', '#5cb3f0'), // Water
            8: createTexture('#ffffff', '#e6e6e6')  // Snow
        };

        for(let i=1; i<=8; i++) {
            document.getElementById(`icon-${i}`).getContext('2d').drawImage(texData[i].canvas, 0, 0, 16, 16, 0, 0, 300, 300);
        }

        const materials = {};
        for(let i=1; i<=8; i++) {
            materials[i] = new THREE.MeshLambertMaterial({ 
                map: texData[i].tex, 
                transparent: i === 7, 
                opacity: i === 7 ? 0.6 : 1.0 
            });
        }

        const geometry = new THREE.BoxGeometry(1, 1, 1);
        geometry.translate(0.5, 0.5, 0.5);

        // ==========================================
        // 3. 区块管理系统 (核心优化)
        // ==========================================
        const worldData = new Map();
        const chunks = new Map(); // key: "cx,cz", val: { meshMap: {type: InstancedMesh} }

        function getHash(x, y, z) { return `${x},${y},${z}`; }
        function getBlock(x, y, z) { return worldData.get(getHash(Math.floor(x), Math.floor(y), Math.floor(z))) || 0; }

        function getChunkCoords(x, z) {
            return {
                cx: Math.floor(x / CONFIG.chunkSize),
                cz: Math.floor(z / CONFIG.chunkSize)
            };
        }

        function updateChunk(cx, cz) {
            const chunkKey = `${cx},${cz}`;
            let chunk = chunks.get(chunkKey);
            
            if (chunk) {
                // 清理旧区块
                Object.values(chunk.meshMap).forEach(m => scene.remove(m));
            }
            
            const meshMap = {};
            const blockCounts = {};

            // 统计该区块内每种类型的方块数量
            for (let x = cx * CONFIG.chunkSize; x < (cx + 1) * CONFIG.chunkSize; x++) {
                for (let z = cz * CONFIG.chunkSize; z < (cz + 1) * CONFIG.chunkSize; z++) {
                    for (let y = 0; y < 64; y++) {
                        const type = getBlock(x, y, z);
                        if (type === 0) continue;
                        
                        // 面剔除优化：如果六面都被遮挡，不渲染
                        const isHidden = getBlock(x+1,y,z)&&getBlock(x-1,y,z)&&getBlock(x,y+1,z)&&getBlock(x,y-1,z)&&getBlock(x,y,z+1)&&getBlock(x,y,z-1);
                        if (isHidden && type !== 7) continue;

                        blockCounts[type] = (blockCounts[type] || 0) + 1;
                    }
                }
            }

            // 创建实例化网格
            const _m = new THREE.Matrix4();
            Object.entries(blockCounts).forEach(([type, count]) => {
                const imesh = new THREE.InstancedMesh(geometry, materials[type], count);
                let idx = 0;
                for (let x = cx * CONFIG.chunkSize; x < (cx + 1) * CONFIG.chunkSize; x++) {
                    for (let z = cz * CONFIG.chunkSize; z < (cz + 1) * CONFIG.chunkSize; z++) {
                        for (let y = 0; y < 64; y++) {
                            if (getBlock(x, y, z) == type) {
                                const isHidden = getBlock(x+1,y,z)&&getBlock(x-1,y,z)&&getBlock(x,y+1,z)&&getBlock(x,y-1,z)&&getBlock(x,y,z+1)&&getBlock(x,y,z-1);
                                if (isHidden && type != 7) continue;
                                _m.makeTranslation(x, y, z);
                                imesh.setMatrixAt(idx++, _m);
                            }
                        }
                    }
                }
                scene.add(imesh);
                meshMap[type] = imesh;
            });

            chunks.set(chunkKey, { meshMap });
        }

        function setBlock(x, y, z, type) {
            x = Math.floor(x); y = Math.floor(y); z = Math.floor(z);
            worldData.set(getHash(x, y, z), type);
            const {cx, cz} = getChunkCoords(x, z);
            updateChunk(cx, cz);
            // 更新相邻区块以处理边界的面剔除
            if (x % CONFIG.chunkSize === 0) updateChunk(cx-1, cz);
            if (x % CONFIG.chunkSize === CONFIG.chunkSize-1) updateChunk(cx+1, cz);
            if (z % CONFIG.chunkSize === 0) updateChunk(cx, cz-1);
            if (z % CONFIG.chunkSize === CONFIG.chunkSize-1) updateChunk(cx, cz+1);
        }

        // ==========================================
        // 4. 地形生成
        // ==========================================
        const simplex = new SimplexNoise();
        for (let x = 0; x < CONFIG.worldSize; x++) {
            for (let z = 0; z < CONFIG.worldSize; z++) {
                const n1 = simplex.noise(x / 60, z / 60);
                const h = Math.floor((n1 + 1) * 10) + 2;
                for (let y = 0; y <= Math.max(h, CONFIG.waterLevel); y++) {
                    let type = 0;
                    if (y <= h) {
                        if (y === h) type = (y <= CONFIG.waterLevel + 1) ? 6 : (y > 18 ? 8 : 1);
                        else if (y > h - 3) type = 2;
                        else type = 3;
                    } else if (y <= CONFIG.waterLevel) {
                        type = 7;
                    }
                    if (type !== 0) worldData.set(getHash(x, y, z), type);
                }
                // 树
                if (h > CONFIG.waterLevel + 2 && Math.random() < 0.01) {
                    for(let i=1; i<5; i++) worldData.set(getHash(x, h+i, z), 4);
                    for(let ix=-1;ix<=1;ix++)for(let iy=4;iy<=5;iy++)for(let iz=-1;iz<=1;iz++)
                        worldData.set(getHash(x+ix, h+iy, z+iz), 5);
                }
            }
        }

        // 初始渲染所有区块
        for(let cx=0; cx<CONFIG.worldSize/CONFIG.chunkSize; cx++) {
            for(let cz=0; cz<CONFIG.worldSize/CONFIG.chunkSize; cz++) {
                updateChunk(cx, cz);
            }
        }

        // ==========================================
        // 5. 物理与交互 (保持原逻辑)
        // ==========================================
        const playerPos = new THREE.Vector3(64, 30, 64);
        const velocity = new THREE.Vector3();
        const keys = { w:false, a:false, s:false, d:false, space:false, shift:false };
        let activeBlockType = 1;
        let onGround = false;

        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        document.addEventListener('keydown', (e) => {
            const k = e.code.toLowerCase();
            if(k === 'keyw') keys.w = true; if(k === 'keys') keys.s = true;
            if(k === 'keya') keys.a = true; if(k === 'keyd') keys.d = true;
            if(k === 'space') keys.space = true; if(k === 'shiftleft') keys.shift = true;
            if(e.key >= '1' && e.key <= '8') {
                activeBlockType = parseInt(e.key);
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                document.getElementById(`slot-${activeBlockType}`).classList.add('active');
            }
        });
        document.addEventListener('keyup', (e) => {
            const k = e.code.toLowerCase();
            if(k === 'keyw') keys.w = false; if(k === 'keys') keys.s = false;
            if(k === 'keya') keys.a = false; if(k === 'keyd') keys.d = false;
            if(k === 'space') keys.space = false; if(k === 'shiftleft') keys.shift = false;
        });

        function checkCollision(pos) {
            for(let x = Math.floor(pos.x - 0.3); x <= Math.floor(pos.x + 0.3); x++) {
                for(let y = Math.floor(pos.y); y <= Math.floor(pos.y + 1.8); y++) {
                    for(let z = Math.floor(pos.z - 0.3); z <= Math.floor(pos.z + 0.3); z++) {
                        const b = getBlock(x, y, z);
                        if(b !== 0 && b !== 7 && b !== 5) return true;
                    }
                }
            }
            return false;
        }

        const selGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.002, 1.002, 1.002));
        selGeo.translate(0.5, 0.5, 0.5);
        const selectionBox = new THREE.LineSegments(selGeo, new THREE.LineBasicMaterial({color: 0x000000}));
        scene.add(selectionBox);

        function raycast() {
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            for(let i=0; i<CONFIG.reachDistance*10; i++) {
                const p = camera.position.clone().add(dir.clone().multiplyScalar(i/10));
                const bx = Math.floor(p.x), by = Math.floor(p.y), bz = Math.floor(p.z);
                if(getBlock(bx, by, bz) !== 0) {
                    selectionBox.position.set(bx, by, bz);
                    selectionBox.visible = true;
                    return {bx, by, bz, p};
                }
            }
            selectionBox.visible = false;
            return null;
        }

        window.addEventListener('mousedown', (e) => {
            if(!controls.isLocked) return;
            const hit = raycast();
            if(!hit) return;
            if(e.button === 0) setBlock(hit.bx, hit.by, hit.bz, 0);
            else if(e.button === 2) {
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                const prev = camera.position.clone().add(dir.multiplyScalar((hit.p.distanceTo(camera.position)-0.1)));
                setBlock(Math.floor(prev.x), Math.floor(prev.y), Math.floor(prev.z), activeBlockType);
            }
        });

        // ==========================================
        // 6. 主循环
        // ==========================================
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);
            
            if(controls.isLocked) {
                raycast();
                const euler = new THREE.Euler(0, 0, 0, 'YXZ').setFromQuaternion(camera.quaternion);
                const input = new THREE.Vector3(Number(keys.d)-Number(keys.a), 0, Number(keys.s)-Number(keys.w)).normalize();
                input.applyAxisAngle(new THREE.Vector3(0,1,0), euler.y);
                
                const speed = keys.shift ? CONFIG.moveSpeed * CONFIG.sprintMulti : CONFIG.moveSpeed;
                velocity.x += (input.x * speed - velocity.x) * 10 * delta;
                velocity.z += (input.z * speed - velocity.z) * 10 * delta;
                
                const inWater = getBlock(playerPos.x, playerPos.y + 0.5, playerPos.z) === 7;
                if(inWater) {
                    velocity.y -= 5 * delta;
                    if(keys.space) velocity.y = 3;
                } else {
                    velocity.y -= CONFIG.gravity * delta;
                    if(onGround && keys.space) velocity.y = CONFIG.jumpForce;
                }

                // X
                playerPos.x += velocity.x * delta;
                if(checkCollision(playerPos)) {
                    playerPos.x -= velocity.x * delta;
                    velocity.x = 0;
                }
                // Z
                playerPos.z += velocity.z * delta;
                if(checkCollision(playerPos)) {
                    playerPos.z -= velocity.z * delta;
                    velocity.z = 0;
                }
                // Y
                onGround = false;
                playerPos.y += velocity.y * delta;
                if(checkCollision(playerPos)) {
                    if(velocity.y < 0) onGround = true;
                    playerPos.y -= velocity.y * delta;
                    velocity.y = 0;
                }

                if(playerPos.y < -10) playerPos.set(64, 30, 64);
                camera.position.set(playerPos.x, playerPos.y + CONFIG.playerEyeHeight, playerPos.z);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
