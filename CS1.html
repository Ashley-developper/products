<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon.js Raycast Vehicle</title>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
    </style>
    <!-- Babylon.js Core and Dependencies -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
    <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <p>Made by Agocrate (Zhanyi Zhou)</p>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        // Boilerplate to expose Babylon variables to your script's scope
        const { 
            Scene, FreeCamera, Vector3, Quaternion, MeshBuilder, KeyboardEventTypes, 
            Color3, TransformNode, FollowCamera, HemisphericLight, Animation, 
            SceneLoader, HavokPlugin, Axis, Space, PhysicsShapeMesh, 
            PhysicsMotionType, PhysicsBody, PhysicsShapeConvexHull, PhysicsRaycastResult 
        } = BABYLON;
        const { GridMaterial } = BABYLON;

        async function init() {
            // Initialize Havok
            const havokInstance = await HavokPhysics();
            globalThis.HK = havokInstance;

            // --- START OF YOUR UPLOADED lol.js CODE (EXACTLY AS PROVIDED) ---
            var createScene = async function () {
                // This creates a basic Babylon Scene object (non-mesh)
                const scene = new Scene(engine);
                const camera = new FreeCamera("camera1", new Vector3(0, 5, -10), scene)
                camera.setTarget(Vector3.Zero())
                camera.attachControl(canvas, true)
                const light = new HemisphericLight("light", new Vector3(0, 1, 0), scene)
                light.intensity = 0.7

                const levelContainer = await SceneLoader.LoadAssetContainerAsync('https://raw.githubusercontent.com/RaggarDK/ArcadeRaycastVehicle/master/public/models/', 'ds01.texless.gltf', scene)
                const levelFiles = levelContainer.instantiateModelsToScene(name => name, true)

                const gravityVector = new Vector3(0, -9.81, 0)
                const physicsPlugin = new HavokPlugin(false)
                scene.enablePhysics(gravityVector, physicsPlugin)

                const levelRootNode = levelFiles.rootNodes[0]
                levelRootNode.scaling.set(.3,.3,.3)
                levelRootNode.computeWorldMatrix(true)

                const gridMaterialBlue = new GridMaterial("")
                gridMaterialBlue.mainColor = new Color3(0.05,0.1,0.3)

                const gridMaterialRed = new GridMaterial("")
                gridMaterialRed.mainColor = new Color3(0.6,0.1,0.3)
                
                const getMeshesByNameIncluded = (meshes, names) => {
                    const result = []
                    meshes.forEach(mesh => {
                        names.forEach(name => {
                            if(mesh.name.includes(name)) result.push(mesh)
                        })
                    })
                    return result
                }
                const levelChildren = levelRootNode.getChildren()
                const staticGeom = getMeshesByNameIncluded(levelChildren, ['ground', 'side', 'pipe', 'ramp', 'rail', 'platform'])
                staticGeom.forEach(mesh => {
                    mesh.computeWorldMatrix(true)
                    const meshPhysicsShape = new PhysicsShapeMesh(
                        mesh,
                        scene
                    )
                    const meshPhysicsBody = new PhysicsBody(mesh, PhysicsMotionType.STATIC, false, scene);
                    meshPhysicsBody.shape = meshPhysicsShape
                    meshPhysicsShape.filterMembershipMask = 1
                    mesh.material = gridMaterialBlue
                })
                const dynamicGeom = getMeshesByNameIncluded(levelChildren, ['barrel', 'Box', 'cone'])
                dynamicGeom.forEach(mesh => {
                    mesh.computeWorldMatrix(true)
                    const meshPhysicsShape = new PhysicsShapeConvexHull(
                        mesh,
                        scene
                    )
                    const meshPhysicsBody = new PhysicsBody(mesh, PhysicsMotionType.DYNAMIC, true, scene);
                    meshPhysicsBody.shape = meshPhysicsShape
                    meshPhysicsBody.setMassProperties({
                        mass: 10
                    })
                    meshPhysicsShape.filterMembershipMask = 1
                    mesh.material = gridMaterialRed
                })

                const chassisMesh = MeshBuilder.CreateBox("Chassis", {width:1, height:0.4, depth:2})
                chassisMesh.position.y = 5
                chassisMesh.position.x = 0
                chassisMesh.rotationQuaternion = new Quaternion()

                const chassisPhysicsShape = new PhysicsShapeConvexHull(
                    chassisMesh,
                    scene
                )

                const chassisPhysicsBody = new PhysicsBody(chassisMesh, PhysicsMotionType.DYNAMIC, false, scene);
                chassisPhysicsBody.shape = chassisPhysicsShape
                chassisPhysicsBody.setMassProperties({
                    centerOfMass: new Vector3(0, -0.5, 0)
                })
                chassisPhysicsShape.filterMembershipMask = 2

                const wheelMesh = MeshBuilder.CreateCylinder("WheelMesh", {height:0.3, diameter:0.4})
                const wheelMeshes = [wheelMesh, wheelMesh.createInstance(1), wheelMesh.createInstance(2), wheelMesh.createInstance(3)]
                wheelMeshes.forEach(mesh => {
                    mesh.rotationQuaternion = new Quaternion()
                })

                const followCamera = new FollowCamera("FollowCam", new Vector3(-6, 0, 0), scene)
                followCamera.heightOffset = 1
                followCamera.radius = 5
                followCamera.rotationOffset = 180
                followCamera.cameraAcceleration = 0.08
                followCamera.maxCameraSpeed = 30
                followCamera.lockedTarget = chassisMesh
                scene.activeCamera = followCamera

                const vehicle = new RaycastVehicle(chassisPhysicsBody, scene)
                vehicle.numberOfFramesToPredict = 60//Number of frames to predict future upwards orientation if airborne
                vehicle.predictionRatio = 0.8//[0-1]How quickly to correct angular velocity towards future orientation. 0 = disabled
                
                const wheelConfig = {
                    positionLocal:new Vector3(0.49, 0, -0.7),//Local connection point on the chassis
                    suspensionRestLength:0.6, //Rest length when suspension is fully decompressed
                    suspensionForce:15000, //Max force to apply to the suspension/spring 
                    suspensionDamping:0.15, //[0-1] Damper force in percentage of suspensionForce
                    suspensionAxisLocal:new Vector3(0,-1,0),//Direction of the spring
                    axleAxisLocal:new Vector3(1,0,0),//Axis the wheel spins around
                    forwardAxisLocal:new Vector3(0,0,1),//Forward direction of the wheel
                    sideForcePositionRatio:0.1,//[0-1]0 = wheel position, 1 = connection point 
                    sideForce:40,//Force applied to counter wheel drifting
                    radius:0.2,
                    rotationMultiplier:0.1//How fast to spin the wheel
                }

                vehicle.addWheel(new RaycastWheel(wheelConfig))//Right rear

                wheelConfig.positionLocal.set(-0.49, 0, -0.7)//Left rear
                vehicle.addWheel(new RaycastWheel(wheelConfig))
                
                wheelConfig.positionLocal.set(-0.49, 0, 0.8)
                vehicle.addWheel(new RaycastWheel(wheelConfig))//Left front
                
                wheelConfig.positionLocal.set(0.49, 0, 0.8)
                vehicle.addWheel(new RaycastWheel(wheelConfig))//Right front
                
                //Attempt at some anti rolling
                vehicle.addAntiRollAxle({wheelA:0,wheelB:1,force:10000}) // right rear - left rear
                vehicle.addAntiRollAxle({wheelA:2,wheelB:3,force:10000}) // left front - right rear

                const controls = {
                    forward:false,
                    backward:false,
                    left:false,
                    right:false
                }
                    
                scene.onKeyboardObservable.add((kbInfo) => {
                    switch (kbInfo.type) {
                        case KeyboardEventTypes.KEYDOWN:
                        if(kbInfo.event.key == 'w') controls.forward = true
                        if(kbInfo.event.key == 's') controls.backward = true
                        if(kbInfo.event.key == 'a') controls.left = true
                        if(kbInfo.event.key == 'd') controls.right = true
                        break
                        case KeyboardEventTypes.KEYUP:
                        if(kbInfo.event.key == 'w') controls.forward = false
                        if(kbInfo.event.key == 's') controls.backward = false
                        if(kbInfo.event.key == 'a') controls.left = false
                        if(kbInfo.event.key == 'd') controls.right = false
                        break
                    }
                })
                
                const maxVehicleForce = 4000
                const maxSteerValue = 0.8;   
const steeringIncrement = 0.01; 
const steerRecover = 0.18;      
                let forwardForce = 0
                let steerValue = 0
                let steerDirection = 0

                scene.onBeforeRenderObservable.add(()=>{
                    forwardForce = 0
                    steerDirection = 0
                    if(controls.forward) forwardForce = 1
                    if(controls.backward) forwardForce = -1
                    if(controls.left) steerDirection = -1
                    if(controls.right) steerDirection = 1
                
                    steerValue += steerDirection*steeringIncrement
                    steerValue = Math.min(Math.max(steerValue, -maxSteerValue), maxSteerValue)
                    steerValue *= 1-(1-Math.abs(steerDirection))*steerRecover
                    vehicle.wheels[2].steering = steerValue
                    vehicle.wheels[3].steering = steerValue

                    vehicle.wheels[2].force = forwardForce*maxVehicleForce
                    vehicle.wheels[3].force = forwardForce*maxVehicleForce
                    
                    vehicle.update()
                    
                    vehicle.wheels.forEach((wheel, index) => {
                        if(!wheelMeshes[index]) return
                        const wheelMesh = wheelMeshes[index]
                        wheelMesh.position.copyFrom(wheel.transform.position)
                        wheelMesh.rotationQuaternion.copyFrom(wheel.transform.rotationQuaternion)
                        wheelMesh.rotate(Axis.Z, Math.PI/2, Space.LOCAL)
                    })
                    
                    
                })

                return scene;
            };

            const tmp1 = new Vector3()
            const tmp2 = new Vector3()
            const tmpq1 = new Quaternion()
            const upAxisLocal = new Vector3(0,1,0)
            const rightAxisLocal = new Vector3(1,0,0)
            const forwardAxisLocal = Vector3.Cross(upAxisLocal, rightAxisLocal)
            forwardAxisLocal.normalize()
            rightAxisLocal.normalize()

            const raycastResult = new PhysicsRaycastResult();
            class RaycastVehicle{
                constructor(body, scene){
                    this.body = body
                    this.scene = scene
                    this.physicsEngine = body._physicsEngine
                    this.wheels = []
                    this.numberOfFramesToPredict = 60
                    this.predictionRatio = 0.6
                    this.nWheelsOnGround = 0
                    this.speed = 0
                    this.antiRollAxles = []
                }

                addWheel(wheel){
                    this.wheels.push(wheel)
                }
                
                removeWheel(wheel, index){
                    if(index) this.wheels.splice(index, 1)
                    this.wheels.splice(this.wheels.indexOf(wheel), 1)
                }
                
                addAntiRollAxle(axle){
                    this.antiRollAxles.push(axle)
                }
                
                removeAntiRollAxle(axle, index){
                    if(index) this.antiRollAxles.splice(index, 1)
                    this.antiRollAxles.splice(this.antiRollAxles.indexOf(axle), 1)
                }
                
                updateWheelTransform(wheel){
                    Vector3.TransformCoordinatesToRef(wheel.positionLocal, this.body.transformNode.getWorldMatrix(), wheel.positionWorld)
                    Vector3.TransformNormalToRef(wheel.suspensionAxisLocal, this.body.transformNode.getWorldMatrix(), wheel.suspensionAxisWorld)
                }
                
                updateVehicleSpeed(){
                    Vector3.TransformNormalToRef(this.body.getLinearVelocity(), this.body.transformNode.getWorldMatrix().clone().invert(), tmp1)
                    this.speed = tmp1.z
                }
                
                updateWheelSteering(wheel){
                    Quaternion.RotationAxisToRef(wheel.suspensionAxisLocal.negateToRef(tmp1), wheel.steering, tmpq1)
                    this.body.transformNode.rotationQuaternion.multiplyToRef(tmpq1, wheel.transform.rotationQuaternion)
                    wheel.transform.rotationQuaternion.normalize()
                    wheel.transform.computeWorldMatrix(true)
                }
                
                updateWheelRaycast(wheel){
                    tmp1.copyFrom(wheel.suspensionAxisWorld).scaleInPlace(wheel.suspensionRestLength).addInPlace(wheel.positionWorld)
                    const rayStart = wheel.positionWorld
                    const rayEnd = tmp1
                    this.physicsEngine.raycastToRef(rayStart, rayEnd, raycastResult)
                    if(!raycastResult.hasHit){
                        wheel.inContact = false
                        return
                    }
                    wheel.hitPoint.copyFrom(raycastResult.hitPointWorld)
                    wheel.hitNormal.copyFrom(raycastResult.hitNormalWorld)
                    wheel.hitDistance = raycastResult.hitDistance
                    wheel.inContact = true
                    this.nWheelsOnGround++
                }
                
                updateWheelSuspension(wheel){
                    if(!wheel.inContact){
                        wheel.prevSuspensionLength = wheel.suspensionLength
                        wheel.hitDistance = wheel.suspensionRestLength
                        return
                    }
                
                    let force = 0.0
                    wheel.suspensionLength = wheel.suspensionRestLength - wheel.hitDistance
                    wheel.suspensionLength = clampNumber(wheel.suspensionLength, 0, wheel.suspensionRestLength);
                    const compressionRatio = wheel.suspensionLength / wheel.suspensionRestLength;

                    const compressionForce = wheel.suspensionForce * compressionRatio;
                    force += compressionForce;

                    const rate = (wheel.prevSuspensionLength - wheel.suspensionLength) / this.scene.getPhysicsEngine().getTimeStep()
                    wheel.prevSuspensionLength = wheel.suspensionLength;

                    const dampingForce = rate * wheel.suspensionForce * wheel.suspensionDamping
                    force -= dampingForce;

                    const suspensionForce = Vector3.TransformNormalToRef(wheel.suspensionAxisLocal.negateToRef(tmp1), this.body.transformNode.getWorldMatrix(), tmp1).scaleInPlace(force)

                    this.body.applyForce(
                        suspensionForce,
                        wheel.hitPoint
                    )
                }
                
                updateWheelSideForce(wheel){
                    if(!wheel.inContact) return
                    const tireWorldVel = getBodyVelocityAtPoint(this.body, wheel.positionWorld)
                    const steeringDir = Vector3.TransformNormalToRef(wheel.axleAxisLocal, wheel.transform.getWorldMatrix(), tmp1)
                    const steeringVel = Vector3.Dot(steeringDir, tireWorldVel)
                    const desiredVelChange = -steeringVel
                    const desiredAccel = desiredVelChange / this.scene.getPhysicsEngine().getTimeStep()
                    this.body.applyForce(
                        steeringDir.scaleInPlace(wheel.sideForce * desiredAccel), 
                        Vector3.LerpToRef(wheel.hitPoint, wheel.positionWorld, wheel.sideForcePositionRatio, tmp2)
                    )
                }
                
                updateWheelForce(wheel){
                    if(!wheel.inContact) return
                    if(wheel.force !== 0){
                        const forwardDirectionWorld = Vector3.TransformNormalToRef(wheel.forwardAxisLocal, wheel.transform.getWorldMatrix(), tmp1).scaleInPlace(wheel.force)
                        this.body.applyForce(forwardDirectionWorld, tmp2.copyFrom(wheel.hitPoint))
                    }
                }
                
                updateWheelRotation(wheel){
                    wheel.rotation += this.speed*wheel.rotationMultiplier*wheel.radius
                    Quaternion.RotationAxisToRef(wheel.axleAxisLocal, wheel.rotation, tmpq1)
                    wheel.transform.rotationQuaternion.multiplyToRef(tmpq1, wheel.transform.rotationQuaternion)
                    wheel.transform.rotationQuaternion.normalize()
                }
                
                updateWheelTransformPosition(wheel){
                    wheel.transform.position.copyFrom(wheel.positionWorld)
                    wheel.transform.position.addInPlace(wheel.suspensionAxisWorld.scale(wheel.hitDistance-wheel.radius))
                }
                
                updateVehiclePredictiveLanding(){
                    if(this.nWheelsOnGround > 0) return
                    const position = this.body.transformNode.position
                    const gravity = tmp1.copyFrom(this.physicsEngine.gravity).scaleInPlace(this.body.getGravityFactor())
                    const frameTime = this.scene.getPhysicsEngine().getTimeStep()
                    const predictTime = this.numberOfFramesToPredict*frameTime
                    
                    const predictedPosition = tmp2
                    predictedPosition.copyFrom(this.body.getLinearVelocity()).scaleInPlace(predictTime)
                    predictedPosition.addInPlace(gravity.scaleInPlace(0.5*predictTime*predictTime))
                    predictedPosition.addInPlace(this.body.transformNode.position)
                    
                    this.physicsEngine.raycastToRef(position, predictedPosition, raycastResult);
                
                    if (raycastResult.hasHit) {
                        const velocity = this.body.getLinearVelocity().normalize()
                        const direction = raycastResult.hitPointWorld.subtractToRef(position, tmp1)
                        const displacement = tmp2
                        displacement.x = velocity.x==0?0:direction.x/velocity.x
                        displacement.y = velocity.y==0?0:direction.y/velocity.y
                        displacement.z = velocity.z==0?0:direction.z/velocity.z
                        const nFrames = displacement.length()
                        const R1 = Vector3.TransformNormalToRef(Axis.Y, this.body.transformNode.getWorldMatrix(), tmp1)
                        const R2 = raycastResult.hitNormalWorld
                        const rotationDifference = Vector3.CrossToRef(R1, R2, tmp2)
                        const timeStepDuration = frameTime*nFrames
                        const predictedAngularVelocity = rotationDifference.scaleToRef(1 / timeStepDuration, tmp2)

                        this.body.setAngularVelocity(Vector3.LerpToRef(this.body.getAngularVelocity(), predictedAngularVelocity, this.predictionRatio, tmp1))
                    }
                    
                }

                update(){
                    this.body.transformNode.computeWorldMatrix(true)
                    this.nWheelsOnGround = 0
                    this.updateVehicleSpeed()
                    
                    this.wheels.forEach((wheel, index) => {
                        this.updateWheelTransform(wheel)
                        this.updateWheelSteering(wheel)
                        this.updateWheelRaycast(wheel)
                        this.updateWheelSuspension(wheel)
                        this.updateWheelForce(wheel)
                        this.updateWheelSideForce(wheel)
                        this.updateWheelTransformPosition(wheel)
                        this.updateWheelRotation(wheel)
                    })
                    
                    this.updateVehiclePredictiveLanding()
                    
                    this.antiRollAxles.forEach(axle => {
                        const wheelA = this.wheels[axle.wheelA]
                        const wheelB = this.wheels[axle.wheelB]
                        if(!wheelA || !wheelB) return
                        if(!wheelA.inContact && !wheelB.inContact) return
                        const wheelOrder = wheelA.suspensionLength <= wheelB.suspensionLength ? [wheelA, wheelB] : [wheelB, wheelA]
                        const maxCompressionRestLength = (wheelA.suspensionRestLength+wheelB.suspensionRestLength)/2
                        const compressionDifference = wheelOrder[1].suspensionLength-wheelOrder[0].suspensionLength
                        const compressionRatio = Math.min(compressionDifference,maxCompressionRestLength)/maxCompressionRestLength
                        
                        const antiRollForce = tmp1.copyFrom(wheelOrder[0].suspensionAxisWorld).scaleInPlace(axle.force*compressionRatio)
                        this.body.applyForce(
                            antiRollForce, 
                            wheelOrder[0].positionWorld
                        )
                        antiRollForce.copyFrom(wheelOrder[1].suspensionAxisWorld).negateInPlace().scaleInPlace(axle.force*compressionRatio)
                        this.body.applyForce(
                            antiRollForce, 
                            wheelOrder[1].positionWorld
                        )
                    })
                    
                }


            }

            class RaycastWheel{
                constructor(options){
                    this.positionLocal = options.positionLocal.clone()
                    this.positionWorld = options.positionLocal.clone()
                    this.suspensionAxisLocal = options.suspensionAxisLocal.clone()
                    this.suspensionAxisWorld = this.suspensionAxisLocal.clone()
                    this.axleAxisLocal = options.axleAxisLocal.clone()
                    this.forwardAxisLocal = options.forwardAxisLocal.clone()
                    this.sideForce = options.sideForce || 40
                    this.sideForcePositionRatio = options.sideForcePositionRatio || 0.1
                    this.radius = options.radius || 0.2
                    this.suspensionRestLength = options.suspensionRestLength || 0.5
                    this.prevSuspensionLength = this.suspensionRestLength
                    this.suspensionLength = this.suspensionRestLength
                    this.suspensionForce = options.suspensionForce || 15000
                    this.suspensionDamping = options.suspensionDamping || 0.1
                    this.rotationMultiplier = options.rotationMultiplier || 0.1
                    this.hitDistance = 0
                    this.hitNormal = new Vector3()
                    this.hitPoint = new Vector3()
                    this.inContact = false
                    
                    this.steering = 0
                    this.rotation = 0
                    this.force = 0

                    this.transform = new TransformNode("WheelTransform")
                    this.transform.rotationQuaternion = new Quaternion()
                }
            }

            const getBodyVelocityAtPoint = (body, point) => {
                const r = point.subtract(body.transformNode.position)
                const angularVelocity = body.getAngularVelocity()
                Vector3.Cross(angularVelocity, r)
                const res = Vector3.Cross(angularVelocity, r)
                const velocity = body.getLinearVelocity()
                res.addInPlace(velocity)
                return res;
            }

            const clampNumber = (num, a, b) => Math.max(Math.min(num, Math.max(a, b)), Math.min(a, b));
            const lerp = (x, y, a) => x * (1 - a) + y * a;
            // --- END OF YOUR UPLOADED lol.js CODE ---

            // Start the engine
            const scene = await createScene();
            engine.runRenderLoop(function () {
                scene.render();
            });

            window.addEventListener("resize", function () {
                engine.resize();
            });
        }

        init();
    </script>
</body>
</html>
