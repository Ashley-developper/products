<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Mozaïk-Portail</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #005494; /* Mozaik 蓝色 */
            margin-bottom: 20px;
            display: block;
        }
        .logo span {
            color: #e30613; /* 红色装饰点缀 */
        }
        h1 {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-top: 5px;
        }
        .btn-submit {
            background-color: #005494;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #003d6b;
        }
        .footer-links {
            margin-top: 20px;
            font-size: 13px;
        }
        .footer-links a {
            color: #005494;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo">Mozaïk<span>-Portail</span></div>
    <h1>Bienvenue au service d'authentification</h1>
    
    <form action="#">
        <div class="input-group">
            <label for="email">Courriel</label>
            <input type="email" id="email" placeholder="nom@exemple.com" required>
        </div>
        
        <button type="submit" class="btn-submit">Suivant</button>
    </form>

    <div class="footer-links">
        <p><a href="#">Besoin d'aide ?</a></p>
        <p><a href="https://info.mozaikportail.ca/en/guide/">Consulter le guide d'utilisation</a></p>
    </div>
</div>

</body>
</html>
